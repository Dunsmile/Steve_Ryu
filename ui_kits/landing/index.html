<!doctype html>
<html lang="ko">
<head>

  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    body { background: var(--bg-1); }
    section[data-screen-label] { scroll-margin-top: 80px; }
    .cta-primary:hover { background: var(--accent-hi); box-shadow: 0 0 0 6px var(--accent-tint); }
    input:focus, select:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 4px var(--accent-tint); }

<body>
  <div id="root"></div>

  <script type="text/babel" src="Nav.jsx"></script>

    function App() {
      return (

          <PainSection />
          <SalaryComparison />
          <PortfolioPreview />
          <Curriculum />
          <ChapterHooks />
          <ToolStack />
          <CompetitorComparison />
          <Mentors />

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
