<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>

  .grid { display: grid; grid-template-columns: 60px 1fr; gap: 12px 24px; align-items: baseline; }
  .w { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
  .s { color: var(--fg-1); letter-spacing: -0.01em; }

<body>
  <div class="grid">
    <div class="w">400</div><div class="s" style="font-weight:400; font-size: 20px;">Pretendard 가나다 ABC 123</div>
    <div class="w">500</div><div class="s" style="font-weight:500; font-size: 20px;">Pretendard 가나다 ABC 123</div>
    <div class="w">600</div><div class="s" style="font-weight:600; font-size: 20px;">Pretendard 가나다 ABC 123</div>
    <div class="w">700</div><div class="s" style="font-weight:700; font-size: 20px;">Pretendard 가나다 ABC 123</div>
    <div class="w">900</div><div class="s" style="font-weight:900; font-size: 20px;">Pretendard 가나다 ABC 123</div>
  </div>
</body>
</html>
