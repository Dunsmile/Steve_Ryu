<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .row + .row { margin-top: 18px; }
  .label { font-size: 10px; color: var(--fg-4); letter-spacing: 0.12em; text-transform: uppercase; width: 80px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 24px; border-radius: var(--r-pill); font-family: var(--font-sans);
    font-weight: 700; font-size: 15px; letter-spacing: -0.01em;
    border: none; cursor: pointer;
    transition: all 220ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .btn-primary { background: var(--accent); color: var(--fg-1); }
  .btn-primary:hover { background: var(--accent-hi); box-shadow: 0 0 0 4px var(--accent-tint); }
  .btn-secondary { background: var(--bg-3); color: var(--fg-1); border: 1px solid var(--stroke-1); }
  .btn-secondary:hover { background: var(--bg-4); border-color: var(--stroke-2); }
  .btn-ghost { background: transparent; color: var(--fg-2); }
  .btn-ghost:hover { color: var(--fg-1); }
  .btn-warn { background: var(--signal-warn); color: #0A0A0F; }
  .btn-lg { padding: 18px 32px; font-size: 17px; }
  .btn-sm { padding: 9px 16px; font-size: 13px; }
  .arrow { font-size: 17px; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Primary</div>
    <button class="btn btn-primary btn-lg">지금 신청하기 <span class="arrow">→</span></button>
    <button class="btn btn-primary">신청하기</button>
    <button class="btn btn-primary btn-sm">신청</button>
  </div>
  <div class="row">
    <div class="label">Variants</div>
    <button class="btn btn-secondary">커리큘럼 보기</button>
    <button class="btn btn-ghost">자세히 보기 →</button>
    <button class="btn btn-warn">한정 32석 신청</button>
  </div>
</body>
</html>
