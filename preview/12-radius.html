<!-- @dsCard group="Spacing" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 76px; height: 76px; background: var(--bg-2); border: 1px solid var(--stroke-1); }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 600; }
  .val { font-size: 10px; color: var(--fg-4); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius: 0"></div><div class="name">r-0</div><div class="val">0px</div></div>
    <div class="item"><div class="box" style="border-radius: 4px"></div><div class="name">r-4</div><div class="val">4px · 배지</div></div>
    <div class="item"><div class="box" style="border-radius: 8px"></div><div class="name">r-8</div><div class="val">8px · 인풋</div></div>
    <div class="item"><div class="box" style="border-radius: 12px"></div><div class="name">r-12</div><div class="val">12px · 카드</div></div>
    <div class="item"><div class="box" style="border-radius: 20px"></div><div class="name">r-20</div><div class="val">20px · 모달</div></div>
  </div>
</body>
</html>
