<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background: var(--bg-1); }
  .table-wrap { padding: 28px 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--stroke-1); }
  th { font-size: 11px; color: var(--fg-4); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
  td { color: var(--fg-2); }
  td.week { font-family: var(--font-mono); color: var(--accent-hi); font-weight: 600; width: 80px; }
  td.title { color: var(--fg-1); font-weight: 600; }
  td.deliv { color: var(--fg-3); }
</style>
</head>
<body>
<div class="table-wrap">
  <table>
    <thead><tr><th>Week</th><th>Phase</th><th>Deliverable</th></tr></thead>
    <tbody>
      <tr><td class="week">W01–04</td><td class="title">BX 기초·브리프 해석</td><td class="deliv">브랜드 컨셉 보드 ×2</td></tr>
      <tr><td class="week">W05–08</td><td class="title">프로덕트 디자인 통합</td><td class="deliv">UX 케이스 스터디 ×1</td></tr>
      <tr><td class="week">W09–12</td><td class="title">실무 포트폴리오 완성</td><td class="deliv">BX 포트폴리오 ×3</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
