<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .stack > * + * { margin-top: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--fg-3); font-weight: 500; }
  .input, .select {
    background: var(--bg-2); border: 1px solid var(--stroke-1); border-radius: var(--r-8);
    color: var(--fg-1); font-family: var(--font-sans); font-size: 15px;
    padding: 12px 14px; outline: none;
    transition: all 220ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .input::placeholder { color: var(--fg-4); }
  .input:focus, .select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }
  .input.error { border-color: var(--signal-danger); }
  .error-msg { color: var(--signal-danger); font-size: 12px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="input-row">
      <div class="field">
        <label>이름</label>
        <input class="input" placeholder="홍길동" value="김지수" />
      </div>
      <div class="field">
        <label>연락처</label>
        <input class="input" placeholder="010-0000-0000" />
      </div>
    </div>
    <div class="field">
      <label>관심 직무</label>
      <select class="select">
        <option>BX 디자이너 (브랜드 익스피리언스)</option>
        <option>프로덕트 디자이너</option>
        <option>아직 모르겠어요</option>
      </select>
    </div>
    <div class="field">
      <label>이메일</label>
      <input class="input error" value="not-an-email" />
      <div class="error-msg">올바른 이메일 형식이 아니에요</div>
    </div>
  </div>
</body>
</html>
