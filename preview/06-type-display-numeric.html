<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; }
  .stack > * + * { margin-top: 14px; }
  .row { display:flex; align-items: baseline; gap: 14px; }
  .num { line-height: 0.95; letter-spacing: -0.04em; font-weight: 900; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
  .accent { color: #3D5AFE; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="num" style="font-size: 96px">90<span class="accent">일</span></span><span class="meta">96px · w900 · -0.04em</span></div>
    <div class="row"><span class="num" style="font-size: 64px">1,300만원 → <span class="accent">50만원</span></span><span class="meta">64px · w900</span></div>
    <div class="row"><span class="num" style="font-size: 40px">포트폴리오 <span class="accent">3개</span></span><span class="meta">40px · w900</span></div>
  </div>
</body>
</html>
