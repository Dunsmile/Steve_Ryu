<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 88px; border-radius: var(--r-12); border: 1px solid var(--stroke-1); }
  .name { font-size: 13px; font-weight: 600; color: var(--fg-1); letter-spacing: -0.01em; }
  .hex  { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0A0A0F"></div><div class="name">bg-1</div><div class="hex">#0A0A0F</div></div>
    <div class="sw"><div class="chip" style="background:#13131A"></div><div class="name">bg-2</div><div class="hex">#13131A</div></div>
    <div class="sw"><div class="chip" style="background:#1C1C26"></div><div class="name">bg-3</div><div class="hex">#1C1C26</div></div>
    <div class="sw"><div class="chip" style="background:#25252F"></div><div class="name">bg-4</div><div class="hex">#25252F</div></div>
  </div>
</body>
</html>
