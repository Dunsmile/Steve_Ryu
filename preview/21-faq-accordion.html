<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  details { background: var(--bg-2); border: 1px solid var(--stroke-1); border-radius: var(--r-12); }
  details + details { margin-top: 8px; }
  summary { padding: 18px 20px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; color: var(--fg-1); font-weight: 600; font-size: 15px; }
  summary::-webkit-details-marker { display: none; }
  .plus { color: var(--accent-hi); font-size: 20px; font-weight: 900; transition: transform 220ms; }
  details[open] .plus { transform: rotate(45deg); }
  .answer { padding: 0 20px 18px; color: var(--fg-3); font-size: 14px; line-height: 1.65; }
</style>
</head>
<body>
  <details open>
    <summary>비전공·비경력인데 따라갈 수 있나요?<span class="plus">+</span></summary>
    <div class="answer">현재 수강생 73%가 비전공자입니다. 첫 2주는 디자인 기초·도구 워밍업이며, 1:1 멘토가 진도를 끌어드립니다.</div>
  </details>
  <details>
    <summary>PD와 BX는 결국 같은 직무 아닌가요?<span class="plus">+</span></summary>
    <div class="answer">결정적으로 다릅니다. 첫 주차에 둘의 산출물·평가 기준을 분해하고, 본인 적성에 맞는 트랙을 같이 잡습니다.</div>
  </details>
</body>
</html>
