<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .item { padding: 16px; background: var(--bg-2); border: 1px solid var(--stroke-1); border-radius: var(--r-12); }
  .stroke-demo { height: 64px; border-radius: 8px; }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 600; margin-top: 10px; }
  .val { font-size: 10px; color: var(--fg-4); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item">
      <div class="stroke-demo" style="background: var(--bg-3); border: 1px solid rgba(255,255,255,0.08);"></div>
      <div class="name">stroke-1</div>
      <div class="val">rgba(255,255,255,0.08) · 기본</div>
    </div>
    <div class="item">
      <div class="stroke-demo" style="background: var(--bg-3); border: 1px solid rgba(255,255,255,0.18);"></div>
      <div class="name">stroke-2</div>
      <div class="val">rgba(255,255,255,0.18) · 호버</div>
    </div>
    <div class="item">
      <div class="stroke-demo" style="background: var(--bg-3); border: 1px solid #3D5AFE; box-shadow: 0 0 0 4px rgba(61,90,254,0.16);"></div>
      <div class="name">accent + glow</div>
      <div class="val">CTA 포커스 / 활성</div>
    </div>
  </div>
</body>
</html>
